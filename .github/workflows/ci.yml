name: CI/CD Pipeline

on:
  push:
    branches: [ "develop" ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1. EJECUTAR PRUEBAS (build C++ + ctest)
  test:
    runs-on: ubuntu-24.04
    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.vcpkg-cache
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Instalar toolchain de compilación
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config \
            autoconf automake libtool autoconf-archive python3 \
            curl zip unzip tar bison flex

      - name: Cache de vcpkg (herramientas + artefactos binarios)
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg
            ${{ github.workspace }}/.vcpkg-cache
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Bootstrap de vcpkg
        run: |
          if [ ! -d "$VCPKG_ROOT/.git" ]; then
            git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
          fi
          "$VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Configurar (CMake + vcpkg)
        run: |
          cmake --preset default -DECF_BUILD_TESTS=ON || {
            echo "=== VCPKG MANIFEST INSTALL LOG ==="
            cat build/vcpkg-manifest-install.log || true
            exit 1
          }

      - name: Compilar
        run: cmake --build build --parallel

      - name: Correr Tests
        run: ctest --test-dir build --output-on-failure

  # 2. AUTO-MERGE A MAIN
  merge-to-main:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.AUTO_MERGE_TOKEN || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Fusionar develop en main
        run: |
          git config --global user.name "JorgeGBeltre"
          git config --global user.email "Jorgegaspar3021@gmail.com"
          git checkout main
          git merge origin/develop --ff-only
          git push origin main

  # 3. CONSTRUIR IMAGEN DOCKER (desde main)
  docker:
    needs: merge-to-main
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código de main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configurar Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir imagen Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ecfdgii-client-cpp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
